<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ClipCamAE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══ EMPTY STATE ═══ -->
  <div id="empty-state" class="empty-state">
    <div class="drop-zone" id="drop-zone">
      <svg class="drop-icon" viewBox="0 0 48 48" fill="none">
        <path d="M6 18V38C6 39.1 6.9 40 8 40H40C41.1 40 42 39.1 42 38V18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M2 18H46" stroke="currentColor" stroke-width="1.5"/>
        <path d="M16 8H32C33.1 8 34 8.9 34 10V18H14V10C14 8.9 14.9 8 16 8Z" stroke="currentColor" stroke-width="1.5"/>
        <path d="M24 24V34M24 34L19 29M24 34L29 29" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <button class="drop-btn" id="btn-open-empty">Open .clipcam</button>
      <span class="drop-hint">or drag &amp; drop here</span>
    </div>
  </div>

  <!-- ═══ LOADED STATE ═══ -->
  <div id="loaded-state" class="loaded-state" style="display:none">

    <!-- Header -->
    <header class="hdr">
      <div class="hdr-left">
        <span class="hdr-title">ClipCamAE</span>
        <span class="hdr-info" id="hdr-info"></span>
      </div>
      <button class="hdr-btn" id="btn-open">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 19a2 2 0 01-2-2V7a2 2 0 012-2h4l2 2h4a2 2 0 012 2v1M5 19h14a2 2 0 002-2v-5"/></svg>
        Open
      </button>
    </header>

    <!-- Curve editor -->
    <div class="curve-wrap" id="curve-wrap">
      <canvas id="curve-canvas"></canvas>
    </div>

    <!-- Property tags -->
    <div class="prop-bar" id="prop-bar"></div>

    <!-- Bottom controls -->
    <footer class="footer">
      <div class="ctrl-row">
        <div class="ctrl-group">
          <label class="ctrl-label">Mode</label>
          <select id="mode-select" class="ctrl-select">
            <option value="cam_frame">Cam Frame</option>
            <option value="lo_layer">LO Layer</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label class="ctrl-label">Target</label>
          <select id="target-select" class="ctrl-select">
            <option value="selected">Selected layer</option>
            <option value="null">New Null</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label class="ctrl-label">LO size</label>
          <div class="lo-size-row">
            <input type="number" id="lo-width" class="ctrl-num" value="1920">
            <span class="lo-x">&times;</span>
            <input type="number" id="lo-height" class="ctrl-num" value="1080">
            <div class="lo-btns">
              <button class="lo-btn" id="btn-lo-from-csp">CSP</button>
              <button class="lo-btn" id="btn-lo-from-comp">Comp</button>
            </div>
          </div>
        </div>
      </div>
      <div class="action-row">
        <span class="status-text" id="status-bar"></span>
        <button class="import-btn" id="btn-import" disabled>Import Keyframes</button>
      </div>
    </footer>

  </div>

  <!-- Drag overlay (shown during drag) -->
  <div id="drag-overlay" class="drag-overlay">
    <div class="drag-overlay-inner">
      <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
        <path d="M24 24V34M24 34L19 29M24 34L29 29" stroke="#2D8CEB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Drop .clipcam file</span>
    </div>
  </div>

  <input type="file" id="file-input" accept=".clipcam" style="display:none">

  <script src="js/CSInterface.js"></script>
  <script src="js/curve-canvas.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
