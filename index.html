<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ClipCam for AE</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══ EMPTY STATE ═══ -->
  <div id="empty-state" class="empty-state">
    <div class="drop-zone" id="drop-zone">
      <img class="drop-icon" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiM4QThBOEEiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cGF0aCBkPSJNMjAgMjBhMiAyIDAgMCAwIDItMlY4YTIgMiAwIDAgMC0yLTJoLTcuOWEyIDIgMCAwIDEtMS42OS0uOUw5LjYgMy45QTIgMiAwIDAgMCA3LjkzIDNINGEyIDIgMCAwIDAtMiAydjEzYTIgMiAwIDAgMCAyIDJaIi8+PHBhdGggZD0iTTEyIDEwdjYiLz48cGF0aCBkPSJtMTUgMTMtMyAzLTMtMyIvPjwvc3ZnPg==" alt="Open">
      <button class="drop-btn" id="btn-open-empty">Open .clip / .clipcam</button>
      <span class="drop-hint">or drag &amp; drop here</span>
    </div>
  </div>

  <!-- ═══ LOADED STATE ═══ -->
  <div id="loaded-state" class="loaded-state" style="display:none">

    <!-- Header (shared) -->
    <header class="hdr">
      <div class="hdr-left">
        <span class="hdr-title">ClipCam</span>
        <span class="hdr-info" id="hdr-info"></span>
      </div>
      <select id="cam-select" class="ctrl-select" style="display:none"></select>
      <button class="hdr-btn" id="btn-open">
        <img width="12" height="12" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiNFNkU2RTYiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cGF0aCBkPSJtNiAxNCAxLjUtMi45QTIgMiAwIDAgMSA5LjI0IDEwSDIwYTIgMiAwIDAgMSAxLjk0IDIuNWwtMS41NCA2YTIgMiAwIDAgMS0xLjk1IDEuNUg0YTIgMiAwIDAgMS0yLTJWNWEyIDIgMCAwIDEgMi0yaDMuOWEyIDIgMCAwIDEgMS42OS45bC44MSAxLjJhMiAyIDAgMCAwIDEuNjcuOUgxOGEyIDIgMCAwIDEgMiAydjIiLz48L3N2Zz4=" alt="">
        Open
      </button>
    </header>

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab active" data-tab="camera">Camera</button>
      <button class="tab" data-tab="layer">Layer<span class="tab-badge" id="layer-badge" style="display:none">0</span></button>
      <div class="tab-indicator" id="tab-indicator"></div>
    </div>

    <!-- ── Camera tab ── -->
    <div id="tab-camera" class="tab-panel active">
      <div class="curve-wrap" id="curve-wrap">
        <canvas id="curve-canvas"></canvas>
      </div>
      <div class="prop-bar" id="cam-prop-bar"></div>
      <footer class="footer">
        <div class="ctrl-row">
          <div class="ctrl-group">
            <label class="ctrl-label">Mode</label>
            <select id="mode-select" class="ctrl-select">
              <option value="cam_frame">Camera Frame</option>
              <option value="lo_layer">LO Comp Layer</option>
            </select>
          </div>
          <div class="ctrl-group">
            <label class="ctrl-label">Target</label>
            <select id="target-select" class="ctrl-select">
              <option value="selected">Selected layer</option>
              <option value="null">New Null</option>
            </select>
          </div>
          <div class="ctrl-group">
            <label class="ctrl-label">LO size</label>
            <div class="lo-size-row">
              <input type="number" id="lo-width" class="ctrl-num" value="1920">
              <span class="lo-x">&times;</span>
              <input type="number" id="lo-height" class="ctrl-num" value="1080">
              <div class="lo-btns">
                <button class="lo-btn" id="btn-lo-from-csp">CSP</button>
                <button class="lo-btn" id="btn-lo-from-comp">Comp</button>
              </div>
            </div>
          </div>
        </div>
        <div class="action-row">
          <span class="status-text" id="status-bar"></span>
          <button class="import-btn" id="btn-import" disabled>Apply</button>
        </div>
      </footer>
    </div>

    <!-- ── Layer tab ── -->
    <div id="tab-layer" class="tab-panel">
      <!-- Empty state (no transforms) -->
      <div class="layer-empty" id="layer-empty">No layer transforms in this file</div>

      <!-- Content (has transforms) -->
      <div class="layer-content" id="layer-content" style="display:none">
        <div class="layer-toolbar">
          <button class="hdr-btn" id="btn-layer-refresh">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M3.5 15a9 9 0 105-8.2L1 10"/></svg>
            Refresh
          </button>
          <button class="hdr-btn" id="btn-layer-automatch">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
            Auto Match
          </button>
          <span class="layer-match-info" id="layer-match-info"></span>
        </div>
        <div class="layer-list-wrap" id="layer-list-wrap">
          <!-- .layer-row items generated by JS -->
        </div>
        <div class="curve-wrap layer-curve-wrap" id="layer-curve-wrap">
          <canvas id="layer-curve-canvas"></canvas>
        </div>
        <div class="prop-bar" id="layer-prop-bar"></div>
        <div class="layer-footer">
          <span class="status-text" id="layer-status"></span>
          <button class="import-btn" id="btn-apply-transforms" disabled>Apply Transforms</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Drag overlay -->
  <div id="drag-overlay" class="drag-overlay">
    <div class="drag-overlay-inner">
      <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
        <path d="M24 24V34M24 34L19 29M24 34L29 29" stroke="#2D8CEB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Drop .clip / .clipcam file</span>
    </div>
  </div>

  <input type="file" id="file-input" accept=".clipcam,.clip" style="display:none">

  <script src="js/CSInterface.js"></script>
  <script src="js/curve-canvas.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
